# Restoration Druid talent configuration (Midnight S1 / 12.0.1)
# skip: true = exclude from analysis
# multiplier: fraction of healing attributable to this talent

# Mastery: Harmony settings (used by Harmonious Blooming & Symbiotic Bloom Mastery)
# pct: player's mastery percentage
# base_stacks: typical number of HoTs on a target (excluding talent-added stacks)
# dr_table: cumulative mastery multiplier per stack count (diminishing returns)
mastery:
  base_stacks: 3
  dr_table: [1.0, 1.7, 2.3, 2.8, 3.2]

